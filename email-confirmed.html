<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Confirmed — BluDrop Innovations</title>
    <meta
      name="description"
      content="Your BluDrop email has been confirmed. Return to the app and log in."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0E1217" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0E1217;
        font-family: "Hanken Grotesk", sans-serif;
        color: #E8EBEF;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      ::selection { background: #6BA8FF; color: #0E1217; }
      a { color: inherit; text-decoration: none; }

      .panel {
        width: 100%;
        max-width: 540px;
        background: #161C24;
        border: 1px solid #1C232B;
        border-radius: 8px;
        padding: 48px 44px 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .panel-glow {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle at 50% 0%, rgba(43, 87, 230, .35), transparent 55%);
        pointer-events: none;
      }
      .panel-inner { position: relative; }

      .brand-logo {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.02em;
        color: #E8EBEF;
        display: inline-block;
        margin-bottom: 40px;
      }
      .brand-logo .dot { color: #6BA8FF; }

      .success-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 28px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(150deg, #2B57E6, #6BA8FF);
        box-shadow: 0 18px 50px rgba(43, 87, 230, .45);
      }
      .success-icon svg {
        width: 34px;
        height: 34px;
        stroke: #0E1217;
        fill: none;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .confirm-title {
        margin: 0 0 12px;
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: 34px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #E8EBEF;
      }
      .message {
        margin: 0 auto;
        max-width: 30rem;
        font-size: 17px;
        line-height: 1.6;
        color: #B7C0CC;
      }
      .home-link {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        margin-top: 28px;
        font-family: "Instrument Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #6BA8FF;
      }

      .panel-footer {
        margin-top: 36px;
        padding-top: 24px;
        border-top: 1px solid #1C232B;
        font-size: 13px;
        color: #6B7480;
      }

      @media (max-width: 480px) {
        .panel { padding: 32px 22px 26px; }
        .confirm-title { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="panel-glow"></div>
      <div class="panel-inner">
        <a class="brand-logo" href="index.html">BluDrop<span class="dot">.</span></a>

        <div class="success-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 class="confirm-title">Email confirmed</h1>
        <p class="message">You're all set. Return to the app and log in to get started.</p>
        <a class="home-link" href="index.html">Back to home →</a>

        <div class="panel-footer">
          © <span id="year"></span> BluDrop Innovation. All rights reserved.
        </div>
      </div>
    </div>

    <script>
      const yearEl = document.getElementById("year");
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear().toString();
      }
    </script>
  </body>
</html>
